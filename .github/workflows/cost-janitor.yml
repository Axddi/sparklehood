name: Cost Janitor

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  cost-janitor:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.8.1
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,iam
          DEFAULT_REGION: us-east-1

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for LocalStack
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:4566/_localstack/health; then
              exit 0
            fi
            sleep 2
          done
          echo "LocalStack did not become healthy in time"
          exit 1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform apply against LocalStack
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r janitor/requirements.txt

      - name: Run unit tests
        working-directory: janitor
        run: python -m pytest tests/test_janitor.py -v

      - name: Run Cost Janitor dry run
        id: janitor
        working-directory: janitor
        run: |
          set +e
          python janitor.py --dry-run \
            --endpoint-url "$AWS_ENDPOINT_URL" \
            --region "$AWS_DEFAULT_REGION"
          exit_code=$?
          set -e

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 2 ]; then
            echo "Cost Janitor crashed with unexpected exit code $exit_code"
            exit "$exit_code"
          fi

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-janitor-report-json
          path: janitor/report.json

      - name: Upload Markdown summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-janitor-summary
          path: janitor/summary.md

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && steps.janitor.outputs.exit_code == '2'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: janitor/summary.md

      - name: Explain cost findings
        if: steps.janitor.outputs.exit_code == '2'
        run: |
          echo "Cost Janitor found orphaned or untagged resources."
          echo "This is expected for the assignment because Terraform creates a known orphan EBS volume."
          echo "See uploaded artifacts and the PR comment for details."
