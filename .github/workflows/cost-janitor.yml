name: Cost Janitor

on:
  pull_request:
  workflow_dispatch:

jobs:

  cost-janitor:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3==1.34.131
          pip install moto==4.2.14
          pip install pytest==8.2.2

      - name: Run tests
        working-directory: janitor
        run: |
          python -m pytest tests/test_janitor.py -v

      - name: Run Cost Janitor
        working-directory: janitor
        run: |
          python janitor.py || true

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        with:
          name: report-json
          path: janitor/report.json

      - name: Upload Markdown summary
        uses: actions/upload-artifact@v4
        with:
          name: report-summary
          path: janitor/summary.md

      - name: Comment PR with summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: janitor/summary.md